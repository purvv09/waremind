<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Security | Advanced Path Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
          
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.8);
            --accent: #60a5fa;
            --accent-glow: rgba(96, 165, 250, 0.3);
            --danger: #f87171;
            --border: rgba(255, 255, 255, 0.05);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- BACKGROUND DECORATION --- */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.15), transparent 80%),
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        .radar {
            width: 120px;
            height: 120px;
            border: 2px solid var(--border);
            border-radius: 50%;
            position: relative;
            margin-bottom: 24px;
        }

        .radar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent) 0deg, transparent 90deg);
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- MAIN INTERFACE --- */
        #main-ui {
            display: none;
            width: 100%;
            max-width: 1100px;
            margin: auto;
            padding: 20px;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Left Column: Selector */
        .sidebar h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin: 0 0 20px 0;
        }

        .company-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .company-card:hover {
            background: rgba(96, 165, 250, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .company-info span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Right Column: Console */
        .console {
            background: rgba(0, 0, 0, 0.4);
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 100px;
            background: rgba(248, 113, 113, 0.1);
            color: var(--danger);
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(248, 113, 113, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: shadow-pulse 1.5s infinite;
        }

        @keyframes shadow-pulse {
            0% { box-shadow: 0 0 0 0px rgba(248, 113, 113, 0.4); }
            100% { box-shadow: 0 0 0 8px rgba(248, 113, 113, 0); }
        }

        .log-area {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.8;
            overflow-y: auto;
            flex-grow: 1;
        }

        .log-entry { margin-bottom: 4px; }
        .log-ts { color: var(--accent); margin-right: 10px; }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div id="preloader">
    <div class="radar"></div>
    <div style="font-family: 'JetBrains Mono'; font-size: 14px; letter-spacing: 4px;">SYSTEM_SCANNING...</div>
    <div id="load-msg" style="color: var(--text-muted); font-size: 12px; margin-top: 10px;">Initializing core modules</div>
</div>

<div id="main-ui">
    <aside class="panel sidebar">
        <h2>Target Selection</h2>
        <div class="company-card">
            <div class="company-info"><strong>Google</strong><span>Global Node Alpha</span></div>
            <div style="font-size: 10px; color: var(--accent);">SECURE</div>
        </div>
        <div class="company-card" style="border-color: var(--danger);">
            <div class="company-info"><strong>Microsoft</strong><span>Azure Instance 09</span></div>
            <div style="font-size: 10px; color: var(--danger);">BREACH</div>
        </div>
        <div class="company-card">
            <div class="company-info"><strong>Amazon</strong><span>AWS-East-1</span></div>
            <div style="font-size: 10px; color: var(--text-muted);">WAITING</div>
        </div>
        <div class="company-card">
            <div class="company-info"><strong>Apple</strong><span>iCloud-Core</span></div>
            <div style="font-size: 10px; color: var(--text-muted);">WAITING</div>
        </div>
    </aside>

    <main class="panel console">
        <div class="console-header">
            <div>
                <h1 style="margin: 0; font-size: 18px;">Threat Analysis Stream</h1>
                <p style="margin: 5px 0 0 0; font-size: 12px; color: var(--text-muted);">Tracing recursive entry points via neural pathing...</p>
            </div>
            <div class="status-pill">
                <div class="pulse"></div> 1 UNRESOLVED THREAT
            </div>
        </div>
        
        <div class="log-area" id="log-area">
            </div>
    </main>
</div>

<script>
    const logs = [
        "Initializing secure handshake...",
        "Validating SSL certificate chains...",
        "Scanning internal subnets for anomalies...",
        "Packet inspection: Sector 09... [OK]",
        "Packet inspection: Sector 10... [ALERT]",
        "Unauthorized access attempt blocked at 192.168.1.42",
        "Encrypted tunnel established.",
        "Detecting path origin..."
    ];

    async function runInit() {
        const msg = document.getElementById('load-msg');
        
        await new Promise(r => setTimeout(r, 1500));
        msg.innerText = "Connecting to global database...";
        
        await new Promise(r => setTimeout(r, 1500));
        msg.style.color = "#f87171";
        msg.innerText = "CRITICAL THREAT DETECTED IN NODE 09";
        
        await new Promise(r => setTimeout(r, 1000));
        document.getElementById('preloader').style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('preloader').style.display = 'none';
            const ui = document.getElementById('main-ui');
            ui.style.display = 'grid';
            setTimeout(() => {
                ui.style.opacity = '1';
                ui.style.transform = 'scale(1)';
                startLogStream();
            }, 50);
        }, 800);
    }

    function startLogStream() {
        const area = document.getElementById('log-area');
        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) {
                const div = document.createElement('div');
                div.className = 'log-entry';
                const now = new Date().toLocaleTimeString();
                div.innerHTML = `<span class="log-ts">[${now}]</span> ${logs[i]}`;
                area.appendChild(div);
                area.scrollTop = area.scrollHeight;
                i++;
            } else {
                clearInterval(interval);
            }
        }, 600);
    }

    window.onload = runInit;
</script>

</body>
</html>
